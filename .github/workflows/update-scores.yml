name: Verify Deployment

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check site is live
        run: |
          set -euo pipefail
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_BYPASS_SECRET }}" \
            "${{ secrets.SITE_URL }}/")

          echo "Main site: $response"
          if [ "$response" != "200" ] && [ "$response" != "307" ] && [ "$response" != "302" ]; then
            echo "❌ Site returned HTTP $response"
            exit 1
          fi
          echo "✅ Site is live"

      - name: Test update-scores endpoint
        run: |
          set -euo pipefail
          response=$(curl -s -o response.txt -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_BYPASS_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.SITE_URL }}/api/update-scores")

          echo "HTTP Status: $response"
          cat response.txt || true

          if [ "$response" = "404" ]; then
            echo "❌ Route not found — redeploy Vercel to pick up latest code"
            exit 1
          fi

          if [ "$response" = "401" ]; then
            echo "❌ Unauthorized — CRON_SECRET in GitHub must match Vercel env var"
            exit 1
          fi

          if [ "$response" = "200" ]; then
            echo "✅ update-scores ran successfully"
          else
            echo "⚠️  Unexpected status $response (check logs above)"
          fi
