name: Verify Deployment

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Vercel deployment
        run: sleep 30

      - name: Check site is live
        run: |
          set -euo pipefail
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_BYPASS_SECRET }}" \
            "${{ secrets.SITE_URL }}/")

          echo "HTTP Status: $response"

          if [ "$response" != "200" ] && [ "$response" != "307" ] && [ "$response" != "302" ]; then
            echo "Error: Site returned HTTP $response"
            exit 1
          fi

          echo "✅ Site is live at ${{ secrets.SITE_URL }}"

      - name: Confirm update-scores route exists
        run: |
          set -euo pipefail
          response=$(curl -s -o response.txt -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_BYPASS_SECRET }}" \
            "${{ secrets.SITE_URL }}/api/update-scores")

          echo "HTTP Status: $response"
          cat response.txt

          if [ "$response" = "404" ]; then
            echo "Error: /api/update-scores route not found"
            exit 1
          fi

          echo "✅ update-scores route confirmed (Vercel cron handles scheduled runs)"
